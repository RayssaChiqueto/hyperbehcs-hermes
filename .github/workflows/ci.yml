name: hyperbehcs-hermes-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  packet-verification:
    name: packet-first verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package smoke
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          hyperbehcs-hermes --help

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify example packet sidecars
        run: python -m hyperbehcs_hermes.cli verify examples/packet.hbp

      - name: Verify public authority surface
        run: |
          python -m hyperbehcs_hermes.cli verify examples/authority_surface.hbp
          python -m hyperbehcs_hermes.cli verify-chain examples/authority_surface.hbp

      - name: Verify every public descriptor pack
        shell: bash
        run: |
          found=0
          for packet in packs/*/*.hbp; do
            found=$((found + 1))
            echo "VERIFY_PACK=${packet}"
            python -m hyperbehcs_hermes.cli verify "${packet}"
            python -m hyperbehcs_hermes.cli verify-chain "${packet}"
          done
          test "${found}" -ge 6
          echo "PACKS_VERIFIED=${found}"

      - name: Verify spindle-wave MCP/WebMCP descriptor
        run: |
          python -m hyperbehcs_hermes.cli verify packs/waves/public_spindle_wave_mcp_webmcp.hbp
          python -m hyperbehcs_hermes.cli verify-chain packs/waves/public_spindle_wave_mcp_webmcp.hbp
          python -m hyperbehcs_hermes.cli wave verify packs/waves/public_spindle_wave_mcp_webmcp.hbp
          python -m hyperbehcs_hermes.cli verify examples/spindle_wave_mcp_webmcp.hbp
          python -m hyperbehcs_hermes.cli verify-chain examples/spindle_wave_mcp_webmcp.hbp
          python -m hyperbehcs_hermes.cli wave verify examples/spindle_wave_mcp_webmcp.hbp

      - name: Smoke CLI listing commands
        shell: bash
        run: |
          python -m hyperbehcs_hermes.cli list-authority | tee /tmp/authority.txt
          python -m hyperbehcs_hermes.cli list-packs | tee /tmp/packs.txt
          test "$(wc -l < /tmp/authority.txt | tr -d ' ')" -gt 20
          test "$(wc -l < /tmp/packs.txt | tr -d ' ')" -gt 6

      - name: Verify promotion examples
        shell: bash
        run: |
          python -m hyperbehcs_hermes.cli verify-promotions examples/promotion_approved.hbp
          if python -m hyperbehcs_hermes.cli verify-promotions examples/promotion_revoked.hbp; then
            echo "revoked promotion unexpectedly passed"
            exit 1
          fi
          echo "REVOKED_PROMOTION_FAILS=expected"

      - name: Enforce no tracked JSON hot path
        shell: bash
        run: |
          json_count=$(git ls-files '*.json' | wc -l | tr -d ' ')
          echo "TRACKED_JSON_FILES=${json_count}"
          test "${json_count}" = "0"

      - name: Enforce public-safe tracked content needles
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess, sys

          files = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
          needles = [
              'USB' + '\\' + 'VID_',
              'GITHUB' + '_' + 'TOKEN',
              'BEGIN ' + 'RSA' + ' PRIVATE KEY',
              'BEGIN ' + 'OPENSSH' + ' PRIVATE KEY',
              'BEGIN ' + 'PRIVATE' + ' KEY',
              'password' + '=',
          ]
          allow = {'docs/PUBLISHING.md'}
          hits = []
          for file_name in files:
              if file_name in allow:
                  continue
              try:
                  text = Path(file_name).read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for needle in needles:
                  if needle in text:
                      hits.append((file_name, needle))
          if hits:
              for file_name, needle in hits:
                  print(f'{file_name}: public-safe needle present: {needle!r}')
              sys.exit(1)
          print('PUBLIC_SAFE_SCAN=pass')
          PY
